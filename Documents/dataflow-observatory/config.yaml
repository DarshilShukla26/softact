kafka:
  brokers:
    - "localhost:9092"
  topics:
    raw_events:     "raw_events"
    quality_alerts: "quality_alerts"
    dead_letter:    "dead_letter"
  consumer_group:   "dfo-validators"

redis:
  addr:     "localhost:6379"
  db:       0
  alert_ttl_seconds: 3600   # alerts expire after 1h

simulators:
  clickstream:
    target_rps: 200
    topic: "raw_events"
  iot_sensor:
    interval_ms: 500
    topic: "raw_events"
    sensors:
      - id: "sensor-001"
        location: "server-room-a"
      - id: "sensor-002"
        location: "warehouse-b"

validator:
  null_rate_threshold:  0.05   # alert if >5% nulls in a window
  anomaly_z_score:      3.0    # alert if value is >3σ from rolling mean
  window_seconds:       60

snowflake:
  account:   "${SNOWFLAKE_ACCOUNT}"
  user:      "${SNOWFLAKE_USER}"
  password:  "${SNOWFLAKE_PASSWORD}"
  warehouse: "DFO_WH"
  database:  "DATAFLOW_OBSERVATORY"
  schema:    "RAW"
