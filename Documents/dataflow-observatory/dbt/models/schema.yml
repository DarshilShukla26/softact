version: 2

models:

  # ── stg_events ──────────────────────────────────────────────────────────────
  - name: stg_events
    description: >
      Staging view that extracts and type-casts all fields from the raw VARIANT
      payload. One row per raw event. Dirty events are included (is_dirty = true).
    columns:
      - name: event_id
        description: UUID assigned by the simulator.
        tests: [not_null]
      - name: source
        description: "clickstream or iot_sensor"
        tests:
          - not_null
          - accepted_values:
              values: ["clickstream", "iot_sensor", "smoke-test"]
      - name: loaded_at
        description: Wall-clock time the row landed in Snowflake.
        tests: [not_null]
      - name: event_timestamp
        description: >
          Parsed event timestamp. NULL when the raw timestamp was malformed —
          that itself is a DQ signal captured downstream.
      - name: is_dirty
        description: True if the simulator tagged this event with a _defect label.
        tests: [not_null]

  # ── fct_events ──────────────────────────────────────────────────────────────
  - name: fct_events
    description: >
      Enriched fact table. Adds time dimensions, per-field null flags, range
      violation flags, and a composite per-event quality score (0–1).
      Incremental — safe to run every few minutes.
    columns:
      - name: event_id
        description: Primary key.
        tests: [not_null, unique]
      - name: event_hour
        description: Truncated to the hour — used as the join key for dq_metrics.
        tests: [not_null]
      - name: event_quality_score
        description: >
          Fraction of required fields that are valid and in-range for this event.
          1.0 = perfect, 0.0 = all fields bad. NULL for unknown source types.
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              inclusive: true
              where: "event_quality_score is not null"

  # ── dq_metrics ──────────────────────────────────────────────────────────────
  - name: dq_metrics
    description: >
      Hourly data quality scorecard per source. Primary driver for Grafana panels.
      quality_score is the mean of per-event scores in that hour.
    columns:
      - name: source
        description: Event source type.
        tests: [not_null]
      - name: event_hour
        description: The hour this bucket represents (UTC).
        tests: [not_null]
      - name: total_events
        description: Raw event count for the hour.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              inclusive: true
      - name: quality_score
        description: Mean per-event quality score. 1.0 = all events perfect.
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 1
              inclusive: true
              where: "quality_score is not null"

  # ── alert_summary ────────────────────────────────────────────────────────────
  - name: alert_summary
    description: >
      Hourly alert counts broken down by source, alert_type, field, and severity.
      Powers the Grafana alert trend and breakdown panels.
    columns:
      - name: alert_hour
        description: Truncated to the hour.
        tests: [not_null]
      - name: source
        description: Source that triggered the alerts.
        tests: [not_null]
      - name: alert_type
        description: "schema_error | null_field | null_rate | anomaly | range_violation | type_error"
        tests:
          - accepted_values:
              values:
                - schema_error
                - null_field
                - null_rate
                - anomaly
                - range_violation
                - type_error
      - name: severity
        description: Alert severity.
        tests:
          - accepted_values:
              values: ["low", "medium", "high", "critical"]
      - name: alert_count
        description: Number of alerts in this bucket.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              inclusive: true
