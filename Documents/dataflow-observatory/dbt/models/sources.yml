version: 2

sources:
  - name: raw
    database: DATAFLOW_OBSERVATORY
    schema: RAW
    description: >
      Raw semi-structured data loaded from Kafka by the Go dispatcher.
      Each row contains a VARIANT payload column plus extracted metadata.

    tables:
      - name: events
        description: All raw events from all sources (clickstream + iot_sensor).
        columns:
          - name: event_id
            description: UUID generated by the simulator.
            tests: [not_null]
          - name: source
            description: Event source type — "clickstream" or "iot_sensor".
            tests:
              - not_null
              - accepted_values:
                  values: ["clickstream", "iot_sensor"]
          - name: loaded_at
            description: Timestamp when the row was inserted by the dispatcher.
            tests: [not_null]
          - name: payload
            description: Full JSON event as a Snowflake VARIANT.
            tests: [not_null]

      - name: quality_alerts
        description: Quality alerts published to quality_alerts Kafka topic.
        columns:
          - name: alert_id
            description: UUID for this alert.
            tests: [not_null, unique]
          - name: source
            description: Source that triggered the alert.
          - name: severity
            description: Alert severity level.
            tests:
              - accepted_values:
                  values: ["low", "medium", "high", "critical"]
          - name: loaded_at
            description: Timestamp when the row was inserted.
            tests: [not_null]
          - name: payload
            description: Full QualityAlert JSON as a Snowflake VARIANT.
            tests: [not_null]
