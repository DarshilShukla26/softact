name: dataflow_observatory
version: "1.0.0"
config-version: 2

profile: dataflow_observatory

model-paths:   ["models"]
analysis-paths: ["analyses"]
test-paths:    ["tests"]
seed-paths:    ["seeds"]
macro-paths:   ["macros"]

target-path:   "target"
clean-targets: ["target", "dbt_packages"]

models:
  dataflow_observatory:
    # staging — lightweight views on top of raw Snowflake tables
    staging:
      +materialized: view
      +schema: staging

    # marts — incremental tables rebuilt as new data arrives
    marts:
      +materialized: incremental
      +schema: analytics
      +on_schema_change: append_new_columns

vars:
  # override at run time: dbt run --vars '{"lookback_hours": 48}'
  lookback_hours: 24
